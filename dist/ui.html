<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazer Command</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--figma-color-bg);
      color: var(--figma-color-text);
      display: flex;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 0 8px;
      box-sizing: border-box;
    }

    .prompt {
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 14px;
      color: #888888; /* Grey for inactive state */
      margin-right: 6px;
      user-select: none;
    }

    .prompt.active {
      color: #007bff; /* Blue for active state */
    }

    #commandInput {
      flex-grow: 1;
      background-color: transparent;
      border: none;
      color: #ffffff;
      font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 14px;
      outline: none;
      padding: 4px 0;
    }

    #commandInput::placeholder {
      color: #666666;
    }

    .success-message {
      position: absolute;
      bottom: 40px; /* Position above the input area */
      left: 8px;
      right: 8px;
      background-color: #28a745; /* Green background */
      color: white;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      pointer-events: none; /* Don't interfere with clicks */
    }

    .success-message.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <span id="prompt" class="prompt">/_</span>
    <input type="text" id="commandInput" placeholder="command here" spellcheck="false" />
    <div id="successMessage" class="success-message"></div>
  </div>

  <script>
    const commandInput = document.getElementById('commandInput');
    const promptElement = document.getElementById('prompt');
    const successMessageElement = document.getElementById('successMessage');
    let isActive = false;
    let successTimeout;

    function setActiveState(active) {
      isActive = active;
      if (active) {
        promptElement.classList.add('active');
        commandInput.disabled = false;
        commandInput.focus();
      } else {
        promptElement.classList.remove('active');
        commandInput.value = ''; // Clear input when deactivating
        commandInput.disabled = true;
        document.body.tabIndex = -1; // Make body focusable
        document.body.focus();   // Focus the body
      }
    }

    function showSuccessMessage(message) {
      successMessageElement.textContent = message;
      successMessageElement.classList.add('show');
      clearTimeout(successTimeout);
      successTimeout = setTimeout(() => {
        successMessageElement.classList.remove('show');
      }, 3000); // Hide after 3 seconds
    }

    // Listen for Control + ' to activate
    document.addEventListener('keydown', (event) => {
      if (event.ctrlKey && event.key === "'") {
        event.preventDefault();
        setActiveState(true);
      } else if (isActive && event.key === 'Escape') {
        event.preventDefault();
        setActiveState(false);
      } else if (isActive && event.key === 'Enter') {
        event.preventDefault();
        const command = commandInput.value.trim();
        if (command) {
          parent.postMessage({ pluginMessage: { type: 'submit-command', command: command } }, '*');
          // setActiveState(false); // Deactivate after submit, handled by focus message from code.ts
        }
      }
    });

    // Listen for messages from the plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg) {
        if (msg.type === 'focus-plugin-input') {
          // If it was active, and we're re-focusing due to canvas click, deactivate.
          // Deactivation will now handle blurring the input.
          if (isActive) {
            setActiveState(false); // This will now focus the body
          } else {
            // If not active, focus the body so it can capture Ctrl+'
            // without a specific input field intercepting all keys.
            document.body.tabIndex = -1;
            document.body.focus();
          }
        } else if (msg.type === 'command-success') {
          showSuccessMessage(msg.message);
          setActiveState(false); // Deactivate and clear, will also blur the input.
        }
      }
    }

    // Initial focus
    commandInput.focus();
    setActiveState(false); // Start in Focus State (input disabled, listening for shortcut)

  </script>
</body>
</html>
